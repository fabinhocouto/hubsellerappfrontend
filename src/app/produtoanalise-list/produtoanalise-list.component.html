<div class="page-container">
  <mat-card class="page-card">

  <div class="card-header">
    <h2>Análise de Produtos</h2>

    <button mat-raised-button color="primary" routerLink="novo">
      <mat-icon>add</mat-icon>
      Novo
    </button>
  </div>

  <mat-card-content>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Filtrar por associado</mat-label>

      <mat-select [(value)]="usuarioSelecionadoId"
                  (selectionChange)="filtrarPorUsuario()">

        <mat-option [value]="null">Todos</mat-option>

        <mat-option *ngFor="let user of usuarios"
                    [value]="user.id">
          {{ user.nomeCompleto }}
        </mat-option>

      </mat-select>
    </mat-form-field>

     

      <table mat-table [dataSource]="dataSource">

        <ng-container matColumnDef="fotoBase64">
  <th mat-header-cell *matHeaderCellDef> Foto </th>
  <td mat-cell *matCellDef="let element">

    <img [src]="element.fotoUrlImgBB || 'assets/images/no-image.png'"
         class="foto-grid"
         alt="Foto do produto" />

  </td>
</ng-container>

        <ng-container matColumnDef="descricao">
          <th mat-header-cell *matHeaderCellDef> Descrição </th>
          <td mat-cell *matCellDef="let element"> {{element.descricao}} </td>
        </ng-container>

        <ng-container matColumnDef="preco">
          <th mat-header-cell *matHeaderCellDef> Menor Preço </th>
          <td mat-cell *matCellDef="let element">
            {{ element.menorPreco | currency:'BRL'}}
          </td>
        </ng-container>   

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef> Ações </th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="primary" 
                    [routerLink]="['editar', element.id]">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <ng-container matColumnDef="resultado">
          <th mat-header-cell *matHeaderCellDef> Status </th>

          <td mat-cell *matCellDef="let element">

            <div class="status-badge"
                [ngClass]="getStatusClass(element.status)">

              <mat-icon>
                {{ getStatusIcon(element.status) }}
              </mat-icon>

              {{ getStatusLabel(element.status) }}

            </div>

          </td>
        </ng-container>

       <tr mat-header-row *matHeaderRowDef="['fotoBase64','descricao','preco','resultado','acoes']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['fotoBase64','descricao','preco','resultado','acoes'];"></tr>

      </table>

    </mat-card-content>
  </mat-card>
</div>
